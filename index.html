<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NPD Diagnostic Report · AIscent Co.</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --pink:  #FF2D7B; --petal: #FFE8F2; --black: #1A1A1A;
  --bloom: #FF85B3; --white: #ffffff; --off:   #F9F6F8;
  --line:  #EEE4EA; --muted: #9A8F95;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--off);color:var(--black);min-height:100vh;}
h1,h2,h3{font-family:'Playfair Display',serif;}

.demo-bar{background:var(--black);padding:10px 28px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;position:sticky;top:0;z-index:50;}
.demo-bar label{font-size:11px;color:rgba(255,255,255,0.4);letter-spacing:0.1em;text-transform:uppercase;}
.demo-bar input,.demo-bar select{padding:6px 10px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);border-radius:3px;color:white;font-family:'DM Sans',sans-serif;font-size:13px;}
.demo-bar input{width:170px;}
.demo-btn{padding:7px 16px;background:var(--pink);color:white;border:none;border-radius:3px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:background 0.2s;}
.demo-btn:hover{background:#e0256d;}
.demo-btn.dark{background:rgba(255,255,255,0.08);}
.demo-btn.dark:hover{background:rgba(255,255,255,0.15);}
.demo-note{font-size:11px;color:rgba(255,255,255,0.2);margin-left:auto;}

.page-tabs{display:flex;background:var(--black);border-top:1px solid rgba(255,255,255,0.06);padding:0 28px;}
.page-tab{padding:10px 18px;font-size:12px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:rgba(255,255,255,0.3);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.2s;}
.page-tab.active{color:var(--pink);border-bottom-color:var(--pink);}
.page-tab:hover{color:rgba(255,255,255,0.65);}

.page{display:none;}
.page.active{display:block;}

.wrap{max-width:1100px;margin:0 auto;padding:32px 28px 80px;}

/* HEADER */
.report-top{margin-bottom:22px;padding-bottom:20px;border-bottom:2px solid var(--line);display:grid;grid-template-columns:1fr auto;gap:20px;align-items:end;}
.brand-lockup{display:flex;align-items:baseline;gap:12px;margin-bottom:12px;}
.brand-logo{font-family:'Playfair Display',serif;font-size:22px;font-weight:900;line-height:1;}
.brand-logo .ai{color:var(--black);}
.brand-logo .scent{color:var(--pink);}
.brand-logo .co{color:var(--black);font-weight:400;font-size:13px;opacity:0.3;margin-left:2px;}
.brand-tagline{font-size:11px;font-weight:600;letter-spacing:0.2em;text-transform:uppercase;color:var(--pink);border-left:2px solid var(--pink);padding-left:10px;line-height:1;}
.rtl{font-size:10px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
.rtm{font-family:'Playfair Display',serif;font-size:clamp(24px,3.5vw,38px);font-weight:900;line-height:1.1;color:var(--black);}
.rtm em{font-style:italic;color:var(--pink);}
.rtr{text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:6px;}
.meta-date{font-size:12px;color:var(--muted);}
.meta-sess{display:inline-flex;align-items:center;gap:5px;background:var(--petal);color:var(--pink);font-size:12px;font-weight:600;padding:5px 11px;border-radius:20px;}
.meta-ph{font-size:11px;color:var(--muted);}

.fn-legend{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.fn-badge{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:20px;border:1px solid var(--line);background:white;font-size:12px;font-weight:500;}
.fn-dot{width:7px;height:7px;border-radius:50%;}

.exec-box{background:var(--pink);color:white;padding:20px 24px;border-radius:4px;margin-bottom:16px;position:relative;overflow:hidden;}
.exec-box::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:rgba(255,255,255,0.3);}
.exec-lbl{font-size:10px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:rgba(255,255,255,0.7);margin-bottom:7px;}
.exec-txt{font-family:'Playfair Display',serif;font-size:clamp(14px,1.8vw,17px);font-style:italic;line-height:1.65;color:rgba(255,255,255,0.95);}

.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px;}
.scard{background:white;border:1px solid var(--line);border-radius:4px;padding:16px 18px;position:relative;overflow:hidden;cursor:pointer;transition:transform 0.2s,box-shadow 0.2s;}
.scard:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(255,45,123,0.1);}
.scard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.scard.pk::before{background:var(--pink);}
.scard.te::before{background:#0D9488;}
.scard.am::before{background:#F59E0B;}
.scard.vi::before{background:#7C3AED;}
.snum{font-family:'Playfair Display',serif;font-size:30px;font-weight:900;line-height:1;margin-bottom:4px;}
.scard.pk .snum{color:var(--pink);}
.scard.te .snum{color:#0D9488;}
.scard.am .snum{color:#F59E0B;}
.scard.vi .snum{color:#7C3AED;}
.slbl{font-size:12px;color:var(--muted);line-height:1.4;}
.shint{font-size:10px;color:var(--bloom);margin-top:4px;font-weight:500;}

.card{background:white;border-radius:4px;border:1px solid var(--line);padding:20px 22px;}
.clbl{font-size:10px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:var(--pink);margin-bottom:12px;}
.ctit{font-family:'Playfair Display',serif;font-size:14px;font-weight:700;margin-bottom:11px;color:var(--black);}

/* ROW LAYOUTS */
.row1{margin-bottom:14px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}

/* FRICTION MATRIX */
.fm-wrap{overflow-x:auto;margin-top:6px;}
.fm-table{width:100%;border-collapse:separate;border-spacing:3px;min-width:500px;}
.fm-table th{font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:4px 3px;text-align:center;color:var(--muted);white-space:nowrap;}
.fm-corner{min-width:120px;}
.fmrl{padding:0 8px 0 0;white-space:nowrap;}
.fmrl-in{display:flex;align-items:center;gap:6px;padding:8px 10px;border-radius:3px;font-size:11px;font-weight:600;color:white;white-space:nowrap;}
.fmdot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.5);flex-shrink:0;}
.fmc{padding:2px;vertical-align:middle;}
.fmci{padding:8px;border-radius:3px;text-align:center;min-width:80px;transition:transform 0.15s;cursor:default;}
.fmci:hover{transform:scale(1.04);}
.fm-self{background:var(--off);opacity:0.4;}
.fm-hi{background:var(--petal);border:1px solid var(--bloom);}
.fm-md{background:#FEF3C7;border:1px solid #FCD34D;}
.fm-lo{background:#D1FAE5;border:1px solid #6EE7B7;}
.fm-no{background:var(--off);border:1px solid var(--line);}
.fml{font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:2px;}
.fm-hi .fml{color:var(--pink);}
.fm-md .fml{color:#B45309;}
.fm-lo .fml{color:#065F46;}
.fm-no .fml{color:var(--muted);}
.fmtp{font-size:10px;color:var(--black);line-height:1.3;}
.fm-no .fmtp{color:var(--muted);font-style:italic;}

/* TIME BARS */
.tbars{display:flex;gap:12px;align-items:flex-end;padding:10px 0 4px;justify-content:space-around;}
.tbi{display:flex;flex-direction:column;align-items:center;gap:5px;flex:1;}
.tbg{border-radius:4px;overflow:hidden;position:relative;}
.tbf{position:absolute;bottom:0;left:0;right:0;border-radius:0 0 4px 4px;transition:height 1.2s cubic-bezier(0.34,1.56,0.64,1);}
.tbn{font-family:'Playfair Display',serif;font-size:20px;font-weight:900;line-height:1;}
.tbl{font-size:11px;font-weight:600;color:var(--black);text-align:center;line-height:1.3;}
.tbw{font-size:10px;color:var(--muted);text-align:center;}

/* PAIN POINTS */
.pain-cols{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:10px;}
.pc{border-radius:4px;overflow:hidden;}
.pch{padding:10px 11px 8px;display:flex;align-items:center;gap:6px;}
.pci{width:23px;height:23px;border-radius:50%;background:rgba(255,255,255,0.25);display:flex;align-items:center;justify-content:center;font-size:11px;}
.pcf{font-size:11px;font-weight:700;color:white;}
.pcb{padding:9px 11px 11px;background:white;border:1px solid var(--line);border-top:none;border-radius:0 0 4px 4px;}
.pi{font-size:12px;line-height:1.5;color:#444;margin-bottom:6px;padding-bottom:6px;border-bottom:1px solid var(--line);display:flex;align-items:flex-start;gap:5px;}
.pi:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
.pid{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:5px;}

/* APPROVAL */
.appr-flow{display:flex;align-items:stretch;gap:0;margin-top:8px;overflow-x:auto;}
.appr-st{flex:1;min-width:95px;padding:11px 9px;background:var(--off);border:1px solid var(--line);position:relative;text-align:center;transition:all 0.2s;cursor:default;}
.appr-st:hover{background:var(--petal);border-color:var(--bloom);}
.appr-st:not(:last-child)::after{content:'>';position:absolute;right:-9px;top:50%;transform:translateY(-50%);font-size:11px;color:var(--muted);z-index:2;}
.appr-st.hi{background:var(--petal);border-color:var(--bloom);}
.appr-st.hi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--pink);}
.an{font-size:10px;font-weight:700;color:var(--black);margin-bottom:4px;}
.aw{font-family:'Playfair Display',serif;font-size:16px;font-weight:900;color:var(--pink);line-height:1;margin-bottom:2px;}
.au{font-size:9px;color:var(--muted);}
.ar{display:inline-block;margin-top:4px;font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:2px 6px;border-radius:10px;}
.rh{background:var(--petal);color:var(--pink);}
.rm{background:#FEF3C7;color:#B45309;}
.rl{background:#D1FAE5;color:#065F46;}

/* BRIEF */
.bels{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:7px;}
.bel{padding:10px 11px;border-radius:3px;border:1px solid var(--line);}
.beln{font-size:11px;font-weight:600;color:var(--black);margin-bottom:5px;}
.belb{height:4px;background:var(--line);border-radius:2px;overflow:hidden;margin-bottom:4px;}
.belf{height:100%;border-radius:2px;transition:width 1.2s ease;width:0;}
.bels2{font-size:11px;font-weight:700;}

/* RECS */
.recs{display:flex;flex-direction:column;gap:9px;margin-top:4px;}
.rc{padding:13px 14px;border-radius:3px;border:1px solid var(--line);display:flex;gap:10px;align-items:flex-start;transition:all 0.2s;cursor:default;}
.rc:hover{border-color:var(--bloom);background:var(--petal);}
.rn{font-family:'Playfair Display',serif;font-size:22px;font-weight:900;color:var(--pink);opacity:0.2;line-height:1;flex-shrink:0;width:22px;}
.rt{font-size:12px;font-weight:700;color:var(--black);margin-bottom:3px;}
.rd{font-size:11px;line-height:1.6;color:#555;}
.rft{display:inline-block;margin-top:5px;font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:2px 7px;border-radius:10px;color:white;}
.rw{display:inline-block;margin-top:3px;margin-left:4px;font-size:9px;font-weight:600;color:var(--muted);background:var(--off);padding:2px 7px;border-radius:10px;border:1px solid var(--line);}

.rfooter{padding-top:22px;border-top:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-top:14px;}

/* ══ PAGE 2 ══ */
.rm-hdr{margin-bottom:26px;padding-bottom:20px;border-bottom:2px solid var(--line);}
.rm-ptag{font-size:10px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:var(--pink);margin-bottom:7px;}
.rm-title{font-family:'Playfair Display',serif;font-size:clamp(22px,3vw,34px);font-weight:900;line-height:1.1;color:var(--black);margin-bottom:6px;}
.rm-title em{font-style:italic;color:var(--pink);}
.rm-sub{font-size:14px;color:var(--muted);font-weight:300;line-height:1.7;max-width:620px;}

.sk-sec{margin-bottom:26px;}
.sk-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px;}
.sk-lbl{font-size:10px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:var(--pink);}
.sk-note{font-size:12px;color:var(--muted);margin-top:3px;}
.add-btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;background:var(--petal);color:var(--pink);border:1.5px solid var(--bloom);border-radius:3px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.2s;}
.add-btn:hover{background:var(--pink);color:white;border-color:var(--pink);}

.sk-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(265px,1fr));gap:12px;}
.skc{background:white;border:1px solid var(--line);border-radius:4px;padding:17px;position:relative;transition:all 0.2s;}
.skc:hover{border-color:var(--bloom);box-shadow:0 5px 18px rgba(255,45,123,0.07);}
.skc.auto{border-top:3px solid var(--pink);}
.skc.manual{border-top:3px solid #F59E0B;}
.skc-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;}
.sk-icon{width:32px;height:32px;border-radius:3px;background:var(--petal);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.sk-rm{background:none;border:none;color:var(--line);cursor:pointer;font-size:14px;padding:2px;line-height:1;transition:color 0.2s;}
.sk-rm:hover{color:var(--pink);}
.sk-name{font-family:'Playfair Display',serif;font-size:14px;font-weight:700;color:var(--black);margin-bottom:5px;}
.sk-desc{font-size:12px;line-height:1.6;color:#555;margin-bottom:9px;}
.sk-tags{display:flex;gap:5px;flex-wrap:wrap;}
.sk-ft{font-size:9px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:3px 7px;border-radius:10px;color:white;}
.sk-pt{font-size:10px;font-weight:500;color:var(--muted);background:var(--off);border:1px solid var(--line);padding:3px 7px;border-radius:10px;}
.sk-src{font-size:9px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--bloom);margin-top:7px;}
.fn-note{display:none;background:var(--black);color:rgba(255,255,255,0.7);padding:10px 12px;border-radius:3px;font-size:12px;line-height:1.6;margin-top:9px;}
.fn-note.vis{display:block;}
.fn-note-lbl{font-size:9px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--pink);margin-bottom:4px;}
.build-btn{display:none;align-items:center;gap:6px;margin-top:10px;padding:9px 16px;background:var(--pink);color:white;border:none;border-radius:20px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.2s;letter-spacing:0.02em;width:100%;justify-content:center;}
.build-btn.vis{display:inline-flex;}
.build-btn:hover{background:#e0256d;transform:translateY(-1px);box-shadow:0 4px 14px rgba(255,45,123,0.3);}
.build-btn:active{transform:translateY(0);}
.build-btn svg{width:13px;height:13px;fill:white;flex-shrink:0;}

.add-form{background:white;border:1.5px solid var(--bloom);border-radius:4px;padding:20px;margin-bottom:16px;display:none;}
.add-form.vis{display:block;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:11px;}
.fg label{display:block;font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
.fg input,.fg select,.fg textarea{width:100%;padding:9px 11px;border:1.5px solid var(--line);border-radius:3px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--black);transition:border-color 0.2s;}
.fg textarea{resize:vertical;min-height:62px;}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--pink);}
.fg.full{grid-column:1/-1;}
.factions{display:flex;gap:8px;margin-top:4px;}

.tl-sec{margin-bottom:26px;}
.tl-lbl{font-size:10px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:var(--pink);margin-bottom:12px;}
.tl-wrap{background:white;border:1px solid var(--line);border-radius:4px;padding:20px;overflow-x:auto;}
.tl-track{display:flex;align-items:center;gap:0;min-width:660px;}
.tl-name{width:95px;flex-shrink:0;font-size:12px;font-weight:700;color:var(--black);padding-right:12px;text-align:right;}
.tl-name span{display:block;font-size:10px;font-weight:400;color:var(--muted);margin-top:2px;}
.tl-cells{display:flex;flex:1;gap:3px;}
.tlc{flex:1;height:42px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;text-align:center;padding:0 3px;line-height:1.3;transition:transform 0.15s;cursor:default;}
.tlc:hover{transform:scale(1.04);}
.tc-e{background:var(--off);border:1px solid var(--line);color:var(--line);}
.tc-b{background:var(--petal);border:1px solid var(--bloom);color:var(--pink);}
.tc-bdk{background:var(--pink);color:white;}
.tc-p{background:#FEF3C7;border:1px solid #FCD34D;color:#B45309;}
.tc-pak{background:#F59E0B;color:white;}
.wk-row{display:flex;flex:1;gap:3px;margin-top:5px;padding-left:95px;}
.wklbl{flex:1;text-align:center;font-size:9px;color:var(--muted);font-weight:500;}

.pulse-card{background:var(--black);color:white;border-radius:4px;padding:24px 26px;display:grid;grid-template-columns:1fr auto;gap:26px;align-items:center;margin-bottom:26px;}
.pc-tag{font-size:10px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:var(--pink);margin-bottom:7px;}
.pc-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:900;margin-bottom:7px;line-height:1.2;}
.pc-text{font-size:13px;line-height:1.75;color:rgba(255,255,255,0.5);font-weight:300;max-width:520px;}
.pc-stats{display:flex;flex-direction:column;gap:9px;flex-shrink:0;}
.pc-stat{text-align:center;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:3px;padding:11px 16px;}
.pcs-n{font-family:'Playfair Display',serif;font-size:24px;font-weight:900;color:var(--pink);line-height:1;}
.pcs-l{font-size:10px;color:rgba(255,255,255,0.4);margin-top:3px;}

@media print{
  .demo-bar,.page-tabs{display:none;}
  .page{display:block!important;}
  .page + .page{page-break-before:always;}
  body{background:white;}
}
@media(max-width:768px){
  .stats-row,.row2,.frow{grid-template-columns:1fr 1fr;}
  .bels{grid-template-columns:1fr;}
  .pain-cols{grid-template-columns:1fr 1fr;}
  .report-top{grid-template-columns:1fr;}
  .rtr{text-align:left;align-items:flex-start;}
  .wrap{padding:18px 14px 60px;}
  .pulse-card{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<div class="demo-bar">
  <label>Company</label>
  <input type="text" id="demoCompany" value="Nordica Beauty Group" />
  <label>Source</label>
  <select id="demoSource">
    <option value="demo">Demo data</option>
    <option value="live">Google Sheets / local</option>
  </select>
  <button class="demo-btn" onclick="gen()">Generate Report</button>
  <button class="demo-btn dark" id="notesBtn" onclick="toggleNotes()">Show Founder Notes</button>
  <button class="demo-btn dark" onclick="window.print()">Export PDF</button>
  <span class="demo-note">AIscent Co. · Consultant View Only</span>
</div>

<div class="page-tabs">
  <div class="page-tab active" id="tab1" onclick="swPage('p1','tab1')">01 · Diagnostic Report</div>
  <div class="page-tab"        id="tab2" onclick="swPage('p2','tab2')">02 · Design Roadmap</div>
</div>

<div class="page active" id="p1">
  <div class="wrap" id="rWrap">
    <div style="text-align:center;padding:60px 0;font-family:'Playfair Display',serif;font-size:18px;font-style:italic;color:var(--muted);">Enter a company name and click Generate Report.</div>
  </div>
</div>

<div class="page" id="p2">
  <div class="wrap" id="rmWrap">
    <div style="text-align:center;padding:60px 0;font-family:'Playfair Display',serif;font-size:18px;font-style:italic;color:var(--muted);">Generate the diagnostic report first.</div>

function getSessions(company){
  if(!STORAGE_URL){
    try{ return Promise.resolve(JSON.parse(localStorage.getItem('npd_'+company.toLowerCase().replace(/\s+/g,'_'))||'[]')); }
    catch(e){ return Promise.resolve([]); }
  }
  return new Promise(resolve=>{
    const cb='rptCb_'+Date.now();
    const script=document.createElement('script');
    let done=false;
    window[cb]=(res)=>{done=true;delete window[cb];if(script.parentNode)script.parentNode.removeChild(script);resolve((res&&res.sessions)?res.sessions:[]);};
    script.onerror=()=>{if(!done){delete window[cb];resolve([]);}};
    script.src=STORAGE_URL+'?company='+encodeURIComponent(company)+'&callback='+cb;
    document.body.appendChild(script);
    setTimeout(()=>{if(!done){delete window[cb];resolve([]);}},8000);
  });
}

function buildMatrix(fns,pairs){
  const lk={};
  (pairs||[]).forEach(p=>{lk[p.from+'|'+p.to]=p;lk[p.to+'|'+p.from]=p;});
  const cols=fns.slice(1);
  const legend=`<div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:10px;">
    <div style="display:flex;align-items:center;gap:4px;font-size:11px;color:var(--muted)"><div style="width:11px;height:11px;border-radius:2px;background:var(--petal);border:1px solid var(--bloom)"></div>High</div>
    <div style="display:flex;align-items:center;gap:4px;font-size:11px;color:var(--muted)"><div style="width:11px;height:11px;border-radius:2px;background:#FEF3C7;border:1px solid #FCD34D"></div>Medium</div>
    <div style="display:flex;align-items:center;gap:4px;font-size:11px;color:var(--muted)"><div style="width:11px;height:11px;border-radius:2px;background:#D1FAE5;border:1px solid #6EE7B7"></div>Low</div>
    <div style="display:flex;align-items:center;gap:4px;font-size:11px;color:var(--muted)"><div style="width:11px;height:11px;border-radius:2px;background:var(--off);border:1px solid var(--line)"></div>No data</div>
  </div>`;
  let th='<thead><tr><th class="fm-corner"></th>';
  cols.forEach(fn=>{const c=FNC[fn]||{bg:'#999'};th+=`<th style="text-align:center;padding:4px 2px"><div style="display:inline-flex;background:${c.bg};color:white;padding:3px 8px;border-radius:20px;font-size:9px;font-weight:700;letter-spacing:0.07em;white-space:nowrap">${fn}</div></th>`;});
  th+='</tr></thead>';
  let tb='<tbody>';
  fns.forEach(rf=>{
    const rc=FNC[rf]||{bg:'#999'};
    let row=`<tr><td class="fmrl"><div class="fmrl-in" style="background:${rc.bg}"><div class="fmdot"></div>${rf}</div></td>`;
    cols.forEach(cf=>{
      if(rf===cf){row+=`<td class="fmc"><div class="fmci fm-self"><span style="color:var(--line)">·</span></div></td>`;return;}
      const p=lk[rf+'|'+cf];
      if(!p){row+=`<td class="fmc"><div class="fmci fm-no"><div class="fml">·</div><div class="fmtp">No data</div></div></td>`;return;}
      const cls=p.lv>=70?'fm-hi':p.lv>=45?'fm-md':'fm-lo';
      const lbl=p.lv>=70?'High':p.lv>=45?'Medium':'Low';
      row+=`<td class="fmc"><div class="fmci ${cls}"><div class="fml">${lbl}</div><div class="fmtp">${p.note||''}</div></div></td>`;
    });
    row+='</tr>'; tb+=row;
  });
  tb+='</tbody>';
  return legend+`<div class="fm-wrap"><table class="fm-table">${th}${tb}</table></div>`;
}

function suggestSkills(d){

  const mr=fp.find(p=>(p.from==='Marketing'&&p.to==='Regulatory')||(p.from==='Regulatory'&&p.to==='Marketing'));
  if(mr&&mr.lv>=60) sk.push({id:'s2',icon:'⊕',src:'auto',ws:3,we:6,name:'Claims Pre-Validation Workflow',desc:'Regulatory reviews claims language at brief stage before development starts. An AI cross-references claims against regulatory requirements by market and flags risks early.',fns:['Regulatory','Marketing'],pt:'Claims validation friction',fn:'Two-step agent. Step one: extract claims from brief. Step two: cross-reference against a regulatory rules database per market. Output is a claims risk report with safe alternatives. Complexity: High. Build time: 2 to 3 weeks.'});
  const hr=(d.appr||[]).filter(s=>s.risk==='high');
  if(hr.length>=2) sk.push({id:'s3',icon:'◎',src:'auto',ws:2,we:5,name:'Approval Readiness Checker',desc:'Before a project enters any approval forum, this AI confirms all required inputs are present. Projects that are not ready are flagged before the meeting, not during it.',fns:['Product Management','Marketing'],pt:'Approval forum delays and rework',fn:'Checklist-driven agent that reads the project brief and stage data. Each forum type has its own checklist. Output is a readiness score and a list of missing items with owners. Complexity: Medium. Build time: 1 to 2 weeks.'});
  const rp=fp.find(p=>(p.from==='R&D'&&p.to==='Packaging')||(p.from==='Packaging'&&p.to==='R&D'));
  if(rp&&rp.lv>=45) sk.push({id:'s4',icon:'⬡',src:'auto',ws:1,we:4,name:'Parallel Gate Workflow',desc:'A workflow map that identifies which activities can run in parallel for each project type. Packaging and formula development stop blocking each other at gates they do not depend on.',fns:['Packaging','R&D'],pt:'Sequential development causing delays',fn:'Process mapping tool that takes a project type as input and outputs a parallel-track timeline showing which activities are truly dependent. Complexity: Low. Build time: 1 week.'});
  const cb=be.find(e=>e.name==='Target Cost'&&e.sc<50);

  return sk;
}

  <div class="rfooter">
    <div style="font-family:'Playfair Display',serif;font-size:13px;color:var(--muted);font-style:italic;">AIscent Co. · Beauty NPD Acceleration · Confidential</div>
    <div style="font-size:11px;color:var(--muted);">Phase 2 Design · Weeks 1 to 12</div>
  </div>`;
}

function buildPrompt(s){
  return `I want to build an AI tool for my NPD consultancy AIscent Co.

Name: ${s.name}
Type: AI agent / workflow
Departments: ${(s.fns||[]).join(', ')}
Pain point: ${s.pt||'Not specified'}
Architecture and context: ${s.fn||'Not specified'}
Expected output: ${s.desc}

Help me:
1. Define the system prompt
2. Define the input format
3. Define the output schema
4. Give me a step-by-step build plan`;
}

async function handleBuildThis(id){
  // Find the skill in current data
  const allSkills = [...suggestSkills(curData), ...custSkills];
  const s = allSkills.find(x => x.id === id);
  if(!s) return;
  const prompt = buildPrompt(s);
  // Copy to clipboard as fallback
  try { await navigator.clipboard.writeText(prompt); } catch(e) {}
  // Open claude.ai with pre-filled prompt
  const encoded = encodeURIComponent(prompt);
  window.open(`https://claude.ai/new?q=${encoded}`, '_blank');
}

function skCard(s){
  const fh=(s.fns||[]).map(fn=>{const c=FNC[fn]||{bg:'#999'};return`<span class="sk-ft" style="background:${c.bg}">${fn}</span>`;}).join('');
  return`<div class="skc ${s.src}" id="sk-${s.id}">
    <div class="skc-top"><div class="sk-icon">${s.icon||'◎'}</div><button class="sk-rm" onclick="rmSk('${s.id}')">✕</button></div>
    <div class="sk-name">${s.name}</div>
    <div class="sk-desc">${s.desc}</div>
    <div class="sk-tags">${fh}<span class="sk-pt">${s.pt||''}</span></div>
    <div class="sk-src">${s.src==='auto'?'Auto-suggested from diagnostic':'Added manually'}</div>
    <div class="fn-note${notesVis?' vis':''}" id="fn-${s.id}">
      <div class="fn-note-lbl">Founder Note · Internal Only</div>${s.fn||'No founder note added yet.'}
    </div>
    <button class="build-btn${notesVis?' vis':''}" onclick="handleBuildThis('${s.id}')">
      Build This Agent
      <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </button>
  </div>`;
}

function buildTL(sks){
  const n=12;
  const bc=Array.from({length:n},(_,i)=>{
    const w=i+1,sk=sks.find(s=>w>=(s.ws||1)&&w<=(s.we||3));
    if(sk){const a=sk.name.split(' ').slice(0,2).join(' ');return`<div class="tlc tc-bdk" title="${sk.name}">${a}</div>`;}
    return`<div class="tlc tc-b" style="opacity:0.25">·</div>`;
  }).join('');
  const pc=Array.from({length:n},(_,i)=>{
    const w=i+1;
    if([4,8,12].includes(w))return`<div class="tlc tc-pak" title="Nova Pulse Check-in">Nova Pulse</div>`;
    return`<div class="tlc tc-p" style="opacity:0.25">·</div>`;
  }).join('');
  const wl=Array.from({length:n},(_,i)=>`<div class="wklbl">W${i+1}</div>`).join('');
  return`<div class="tl-wrap">
    <div class="tl-track"><div class="tl-name">Build <span>AI Skills</span></div><div class="tl-cells">${bc}</div></div>
    <div class="tl-track" style="margin-top:5px"><div class="tl-name">Pulse <span>Nova Check-in</span></div><div class="tl-cells">${pc}</div></div>
    <div class="wk-row">${wl}</div>
  </div>`;
}

function toggleForm(){document.getElementById('addForm').classList.toggle('vis');}

function addSk(){
  const name=document.getElementById('nName').value.trim();
  const desc=document.getElementById('nDesc').value.trim();
  if(!name||!desc){alert('Please enter a name and description.');return;}
  custSkills.push({id:'c'+Date.now(),icon:'✦',src:'manual',ws:6,we:10,name,desc,fns:[document.getElementById('nFn').value],pt:document.getElementById('nPain').value.trim(),fn:document.getElementById('nNote').value.trim()});
  toggleForm();
  renderRoadmap(curData);
}

function rmSk(id){
  const el=document.getElementById('sk-'+id);
  if(el){el.style.opacity='0';el.style.transition='opacity 0.3s';setTimeout(()=>el.remove(),300);}
  custSkills=custSkills.filter(s=>s.id!==id);
}

window.addEventListener('load',gen);
</script>
</body>
</html>
